  properties:
    html: "<div style =\"text-align: center; padding: 10px; border: 1px solid #e0e0e0;  \n  <h3 id =\"title-display\" style= \"color: #333\";>Maths</h3>   \n\n  \n  <circle-progress id =\"my-progress\" value=\"100\" max=\"100\" text-format=\"percent\" \n    style=\"--circle-progress-fill-color: #4B308E; width: 150px; height: 150px\">  \n  </circle-progress>   \n</div> \n\n<script>\n  /** \n * Updates the progress bar value \n * This can be called from Python using self.call _js ('setProgress', 75) \n */ \n  function setProgress(val) {\n    // We use this.find() to make sure we only change the circle inside THIS card \n    const cp = this.find('#my-progress'); \n    if (cp) {\n      cp.value = val;\n    }\n  } \n</script>  "
