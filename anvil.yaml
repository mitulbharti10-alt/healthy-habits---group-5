metadata: {description: Our app is designed to help student track their studying time and build good study habits, logo_img: 'asset:Logo maker project.png', title: FunStud}
name: Healthy Habits - Group 5
native_deps:
  head_html: "0<script src=\"https://cdn.jsdelivr.net/npm/js-circle-progress/dist/circle-progress.min.js\" type=\"module\"></script> \n\n"
package_name: Healthy_Habits___Group_5
renamed: true
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
scheduled_tasks: []
services:
- client_config: {}
  server_config: {}
  source: /runtime/services/tables.yml
- client_config: {}
  server_config: {custom_smtp: true}
  source: /runtime/services/anvil/email.yml
- client_config: {allow_signup: true, confirm_email: false, enable_automatically: true, mfa_timeout_days: 0, require_mfa: false, require_secure_passwords: true, use_email: true, use_facebook: false, use_google: false}
  server_config:
    email_content:
      confirm_address:
        html: |-
          <p>Thanks for registering your account with us. Please click the following link to confirm that this is your account:</p>
          <p>{{confirm_link}}</p>
          <p>Thanks,</p>
          <p>The team</p>
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/google.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/facebook.yml
startup: {module: Dashboard, type: form}
startup_form: null
