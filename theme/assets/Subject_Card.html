                 style="--circle-progress-fill-color: #4B308E">

<script>
/** 
 * Updates the progress bar value 
 * This can be called from Python using self.call _js ('setProgress', 75) 
 */ 
  function setProgress(val) {
    // We use this.find() to make sure we only change the circle inside THIS card 
    const cp = this.find('#my-progress'); 
    if (cp) {
      cp.value = val;
    }
  }
